<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MockLab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:11px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}

.logo-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.logo-icon {display: flex; align-items: center; justify-content: center;}
.logo-icon svg { width: 30px; height: 30px; fill: var(--topbar-text); }
.logo-text { color: var(--topbar-text); }
.logo-text .brand { font-size: 15px; font-weight: 700; }
.logo-text .slogan { font-size: 10px; opacity: 0.75; letter-spacing: 0.5px; }
  
#in-error{width:400px}


.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{padding:5px 13px;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-outline{background:rgba(255,255,255,.15);color:white;border:1px solid rgba(255,255,255,.3)}
.btn-outline:hover{background:rgba(255,255,255,.25)}
select{padding:5px 10px;border:none;border-radius:6px;font-size:13px}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:230px;background:white;border-right:1px solid #e8e8e8;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:9px 16px;border-bottom:1px solid #e8e8e8;font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.iface-list{flex:1;overflow-y:auto}
.iface-item{padding:9px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5;font-size:13px;display:flex;align-items:center;gap:8px;transition:background .15s}
.iface-item:hover{background:#f8f9ff}
.iface-item.active{background:#eceeff;border-left:3px solid #667eea;padding-left:11px}
.mth{font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;flex-shrink:0}
.mth-post{background:#dcfce7;color:#166534}
.mth-get{background:#dbeafe;color:#1e40af}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content-top{flex:1;display:flex;overflow:hidden}
.editor-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #e8e8e8}
.panel-header{padding:9px 16px;background:white;border-bottom:1px solid #e8e8e8;font-size:13px;font-weight:600;color:#555;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.mth-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;flex-shrink:0}
.badge-post{background:#dcfce7;color:#166534}
.badge-get{background:#dbeafe;color:#1e40af}
.b-r{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;background:#fee2e2;color:#dc2626}
.b-o{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;background:#f1f5f9;color:#666}
.b-s{font-size:10px;padding:1px 5px;border-radius:3px;background:#f1f5f9;color:#ccc;text-decoration:line-through}
.b-rf{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;background:#fef3c7;color:#92400e}
.b-nested{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;background:#ede9fe;color:#7c3aed}
.b-dyn{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;background:#dbeafe;color:#1d4ed8}
.settings-bar{background:#f8f9ff;border-bottom:1px solid #e0e7ff;padding:8px 16px;display:none;flex-wrap:wrap;gap:16px;align-items:center;font-size:13px}
.settings-bar.visible{display:flex}
.sg{display:flex;align-items:center;gap:6px}
.sg label{font-weight:600;color:#555;font-size:12px}
.sg input{ padding:4px 8px;border:1.5px solid #c7d2fe;border-radius:5px;font-size:12px;font-family:monospace;width:130px;background:#fff;transition:border-color .2s}
.sg input:focus{outline:none;border-color:#667eea}
.sg .hint{font-size:11px;color:#94a3b8}
.sg .updated{font-size:11px;color:#16a34a;font-weight:600;opacity:0;transition:opacity .3s}
.sg .updated.show{opacity:1}
.editor-body{flex:1;overflow-y:auto;padding:12px;background:#fafafa}
.fg{background:white;border-radius:8px;padding:11px;margin-bottom:7px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.fl{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.fn{font-family:"SF Mono","Consolas",monospace;font-size:13px;font-weight:600;color:#333}
.fd{font-size:11px;color:#94a3b8}
.fi{width:100%;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:13px;font-family:"SF Mono","Consolas",monospace;transition:border-color .2s;background:#fafafa;box-sizing:border-box;resize:vertical;}
.fi:focus{outline:none;border-color:#667eea;background:white}
.fi:read-only,.fi[readonly]{background:#f5f5f5;color:#888;cursor:not-allowed}
.fi.sk{background:#f9f9f9;color:#ccc;text-decoration:line-through}
.nested-badge{cursor:pointer;font-size:10px;padding:1px 6px;border-radius:3px;background:#ede9fe;color:#7c3aed;margin-left:4px;user-select:none}
.nested-preview{background:#f8f7ff;border-radius:6px;border:1px solid #ddd;padding:8px;margin-top:6px;font-family:"SF Mono","Consolas",monospace;font-size:11px;color:#555;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;display:none}
.nested-preview.open{display:block}
.eh{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:14px;text-align:center;padding:40px}
.eh .ic{font-size:48px;margin-bottom:12px}
.resp-panel{width:440px;display:flex;flex-direction:column;background:white;flex-shrink:0}
.resp-header{padding:9px 16px;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.resp-header-left{display:flex;align-items:center;gap:8px}
.sb{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.s-ok{background:#dcfce7;color:#166534}
.s-err{background:#fee2e2;color:#991b1b}
.resp-body{flex:1;overflow-y:auto;padding:12px;background:#1e1e1e}
.resp-body pre{font-family:"SF Mono","Consolas",monospace;font-size:12px;color:#d4d4d4;white-space:pre-wrap;word-break:break-all;line-height:1.7}
.k{color:#9cdcfe}
.s{color:#ce9178}
.n{color:#b5cea8}
.bo{color:#569cd6}
.br{color:#ffd700}
.action-bar{padding:10px 20px;background:white;border-top:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.btn-primary{padding:9px 30px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.4)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.bottom-bar{padding:5px 16px;background:#fafafa;border-top:1px solid #e8e8e8;display:flex;align-items:center;gap:16px;font-size:11px;color:#888;flex-shrink:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo-group">
      <div class="logo-icon">
          <svg t="1775024858677" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="7692" width="200" height="200"><path d="M101.35 76.46H76.46C69.58 76.46 64 82.04 64 88.92v572.41c0 6.89 5.57 12.46 12.46 12.46h24.89c6.87 0.02 12.44-5.54 12.46-12.4V88.92c0-6.89-5.6-12.46-12.46-12.46zM947.54 76.46h-24.89c-6.88 0-12.46 5.58-12.46 12.46v572.41c0 6.89 5.54 12.46 12.46 12.46h24.89c6.88 0 12.46-5.58 12.46-12.46V88.92c0-6.89-5.6-12.46-12.46-12.46zM140.7 76.46v570.85c0 47.26 29.43 94.97 71.76 120.2l301.58 180.03 296.85-177.18c44.85-26.8 76.47-75.79 76.47-123.06V76.46H140.7z m551.84 534.57h-64.18v-237.7l-82.72 237.7h-69.41l-78.44-237.7v237.7h-64.18v-317.1h98.41l78.92 247.69 83.2-247.69h98.41v317.1z" fill="#ffffff" p-id="7693"></path></svg>
      </div>
      <div class="logo-text">
          <div class="brand">MockLab</div>
          <div class="slogan">智能Mock数据生成器</div>
      </div>
  </div>

    <select id="proj-select"><option value="">-- 选择项目 --</option></select>
    <div class="header-right">
      <button class="btn btn-outline" onclick="clearState()">清空状态</button>
      <button class="btn btn-outline" onclick="location.reload()">刷新</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">接口列表</div>
      <div class="iface-list" id="iface-list"><div class="eh" style="font-size:12px"><div class="ic">📡</div>选择项目</div></div>
    </div>
    <div class="content">
      <div class="content-top">
        <div class="editor-panel">
          <div class="panel-header" id="editor-hdr" style="display:none">
            <span class="mth-badge badge-post" id="mth-badge">POST</span>
            <span id="iface-path" style="font-family:monospace;font-size:12px;color:#334155;word-break:break-all"></span>
            <span id="iface-name" style="margin-left:8px;color:#94a3b8;font-size:12px"></span>
          </div>
          <div class="settings-bar" id="settings-bar">
            <!-- 延迟配置 -->
            <div class="sg">
              <label>延迟</label>
              <input type="checkbox" id="in-delay-on" style="width:14px;height:14px;cursor:pointer">
              <input id="in-delay-min" placeholder="最小ms" style="width:70px" type="number" min="0">
              <span>-</span>
              <input id="in-delay-max" placeholder="最大ms" style="width:70px" type="number" min="0">
              <span class="hint">ms</span>
            </div>
            <!-- 错误注入配置 -->
            <div class="sg">
              <label>错误</label>
              <input type="checkbox" id="in-err-on" style="width:14px;height:14px;cursor:pointer">
              <select id="in-err-type" style="font-size:12px;padding:4px 6px;border:1.5px solid #c7d2fe;border-radius:5px">
                <option value="500">500</option>
                <option value="400">400</option>
                <option value="401">401</option>
                <option value="403">403</option>
                <option value="404">404</option>
                <option value="429">429</option>
                <option value="timeout">timeout</option>
                <option value="network_error">network_error</option>
                <option value="rate_limit">rate_limit</option>
              </select>
              <input id="in-err-prob" placeholder="概率" style="width:55px" type="number" min="0.001" max="1" step="0.01" value="1">
              <input id="in-err-code" placeholder="错误码" style="width:80px">
              <input id="in-err-msg" placeholder="错误消息" style="width:120px">
              <span class="updated" id="updated-msg">已保存</span>
            </div>
            <button class="btn" style="font-size:11px;padding:4px 12px;background:#667eea;color:white;border:none;border-radius:5px;cursor:pointer" onclick="saveSettings()">保存</button>
          </div>
          <div class="editor-body" id="editor-body"><div class="eh"><div class="ic">👈</div>从左侧选择一个接口</div></div>
        </div>
        <div class="resp-panel">
          <div class="resp-header">
            <div class="resp-header-left">
              <span style="font-weight:600;font-size:13px">响应结果</span>
              <span class="sb" id="status-badge" style="display:none"></span>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-outline" style="font-size:11px;padding:4px 10px" onclick="fmtResp()">格式化</button>
              <button class="btn btn-outline" style="font-size:11px;padding:4px 10px" onclick="cpResp()">复制</button>
            </div>
          </div>
          <div class="resp-body" id="resp-body"><div class="eh" style="color:#666"><div class="ic">📋</div>点击发送请求后查看响应</div></div>
        </div>
      </div>
      <div class="action-bar" id="action-bar" style="display:none">
        <div style="font-size:12px;color:#888" id="req-summary"></div>
        <button class="btn-primary" id="send-btn" onclick="sendReq()">🚀 发送请求</button>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <span>🏃 MockLab 运行中</span>
    <span id="proj-info">-</span>
    <span id="iface-count">0 个接口</span>
  </div>
</div>
<script>
var curProj="",curIface=null,interfaces=[];

function eH(s){if(s==null)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function eA(s){if(s==null)return"";return String(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;")}

// Pretty-print a JSON object/string for display in the syntax-highlighter
function pp(json){
  if(typeof json === "string"){
    try { json = JSON.parse(json); } catch(e){ return json; }
  }
  return JSON.stringify(json, null, 2);
}

// Syntax highlight JSON string
function sh(json){
  var text = typeof json === "string" ? json : JSON.stringify(json, null, 2);
  text = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  var res="",inStr=false,sc="",i=0;
  while(i<text.length){
    var c=text[i];
    if(!inStr){
      if(c==='"'){inStr=true;sc='"';res+='<span class="s">"';}
      else if(c==="{"||c==="}")res+="<span class='br'>"+c+"</span>";
      else if(c==="["||c==="]")res+="<span class='br'>"+c+"</span>";
      else if(c===":")res+="<span class='k'>:</span>";
      else if(c===",")res+="<span class='br'>,</span>";
      else if(c==="t"&&text.slice(i,i+4)==="true"){res+="<span class='bo'>true</span>";i+=4;continue;}
      else if(c==="f"&&text.slice(i,i+5)==="false"){res+="<span class='bo'>false</span>";i+=5;continue;}
      else if(c==="n"&&text.slice(i,i+4)==="null"){res+="<span class='bo'>null</span>";i+=4;continue;}
      else if((c==="-"||(c>="0"&&c<="9"))){var n=c;i++;while(i<text.length&&(text[i]>="0"&&text[i]<="9"||text[i]==="."||text[i]==="e"||text[i]==="E"||text[i]==="+"||text[i]==="-")){n+=text[i];i++;}res+="<span class='n'>"+n+"</span>";continue;}
      else res+=c;i++;continue;
    }else{
      if(c==="\\"&&i+1<text.length){res+=text[i]+text[i+1];i+=2;}
      else if(c===sc){res+='"</span>';inStr=false;i++;}
      else{res+=c;i++;}
    }
  }
  return res;
}

async function init(){
  var r=await fetch("/mock/projects");var j=await r.json();
  if(j.code!==0||!j.data||!j.data.length)return;
  var sel=document.getElementById("proj-select");
  j.data.forEach(function(p){var o=document.createElement("option");o.value=p.name;o.textContent=p.name+" ("+p.count+" 个接口)";sel.appendChild(o);});
  if(j.data.length===1){sel.value=j.data[0].name;await selProj(j.data[0].name);}
  document.getElementById("proj-info").textContent=j.data[0].name||"-";
  sel.onchange=function(){selProj(this.value);};
}

async function selProj(n){
  if(!n)return;curProj=n;
  var r=await fetch("/mock/project/"+encodeURIComponent(n));var j=await r.json();
  if(j.code!==0)return;
  interfaces=j.data||[];renderList();
  document.getElementById("iface-count").textContent=interfaces.length+" 个接口";
}

function renderList(){
  var lst=document.getElementById("iface-list");lst.innerHTML="";
  interfaces.forEach(function(iface){
    var div=document.createElement("div");div.className="iface-item";div.dataset.path=iface.path;
    var m=(iface.method||"POST").toUpperCase();
    var nm=iface.name||iface.path;if(nm.length>24)nm=nm.substring(0,24)+"…";
    div.innerHTML='<span class="mth mth-'+m.toLowerCase()+'">'+m+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+eA(iface.name||iface.path)+'">'+eH(nm)+'</span>';
    div.onclick=function(){selIface(iface.path);};lst.appendChild(div);
  });
}

async function selIface(path){
  document.querySelectorAll(".iface-item").forEach(function(el){el.classList.toggle("active",el.dataset.path===path);});
  var r=await fetch("/mock/example/"+encodeURIComponent(curProj)+"/"+encodeURIComponent(path.replace(/^\//,'')));
  var j=await r.json();
  if(j.code!==0){alert((j.error||"加载失败")+"");return;}
  curIface=j.data;renderEditor();renderSettings();
  document.getElementById("editor-hdr").style.display="flex";
  document.getElementById("settings-bar").classList.add("visible");
  document.getElementById("action-bar").style.display="flex";
  document.getElementById("send-btn").disabled=false;
  var m=(curIface.method||"POST").toUpperCase();
  var mb=document.getElementById("mth-badge");mb.textContent=m;mb.className="mth-badge badge-"+m.toLowerCase();
  document.getElementById("iface-path").textContent=curIface.path;
  document.getElementById("iface-name").textContent=curIface.interface||"";
  document.getElementById("resp-body").innerHTML='<div class="eh" style="color:#666"><div class="ic">📋</div>点击发送请求查看响应</div>';
  document.getElementById("status-badge").style.display="none";
}

function renderSettings(){
  if(!curIface)return;
  // delay: "300-800" 或 "" 或 null
  var d=curIface.delay||"";
  var dOn=d&&d!=="0";
  var dParts=d.split("-");
  document.getElementById("in-delay-on").checked=dOn;
  document.getElementById("in-delay-min").value=dParts[0]||"";
  document.getElementById("in-delay-max").value=dParts[1]||"";

  // error: "500@1.0:ERR001:消息" 或 "" 或 null
  var e=curIface.error||"";
  var eOn=e&&e!=="0"&&e!=="";
  document.getElementById("in-err-on").checked=eOn;
  // 从 error 字符串解析（兼容旧格式）
  if(e){
    var eParts=e.split("@");
    var httpCode=eParts[0]||"500";
    var probStr="1";
    var errCode="";
    var errMsg="";
    if(eParts.length>1){
      var rest=eParts[1].split(":");
      probStr=rest[0]||"1";
      if(rest.length>1) errCode=rest[1]||"";
      if(rest.length>2) errMsg=rest.slice(2).join(":")||"";
    }
    document.getElementById("in-err-type").value=httpCode||"500";
    document.getElementById("in-err-prob").value=probStr||"1";
    document.getElementById("in-err-code").value=errCode||"";
    document.getElementById("in-err-msg").value=errMsg||"";
  } else {
    document.getElementById("in-err-type").value="500";
    document.getElementById("in-err-prob").value="1";
    document.getElementById("in-err-code").value="";
    document.getElementById("in-err-msg").value="";
  }
  document.getElementById("updated-msg").classList.remove("show");
}

async function saveSettings(){
  if(!curIface)return;
  // 延迟
  var delayOn=document.getElementById("in-delay-on").checked;
  var delayMin=document.getElementById("in-delay-min").value;
  var delayMax=document.getElementById("in-delay-max").value;
  var delay="";
  if(delayOn){
    if(delayMin&&delayMax) delay=delayMin+"-"+delayMax;
    else if(delayMin) delay=delayMin;
  }

  // 错误注入
  var errOn=document.getElementById("in-err-on").checked;
  var errType=document.getElementById("in-err-type").value;
  var errProb=document.getElementById("in-err-prob").value||"1";
  var errCode=document.getElementById("in-err-code").value;
  var errMsg=document.getElementById("in-err-msg").value;
  var error="";
  if(errOn){
    error=errType;
    if(errProb&&parseFloat(errProb)<1) error+="@"+errProb;
    if(errCode||errMsg){
      error+=":"+errCode;
      if(errMsg) error+=":"+errMsg;
    }
  }

  var payload={project:curProj,path:curIface.path,delay:delay,error:error};
  var r=await fetch("/mock/update-iface",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  var j=await r.json();
  if(j.code===0){
    curIface.delay=delay;
    curIface.error=error;
    var msg=document.getElementById("updated-msg");
    msg.classList.add("show");
    setTimeout(function(){msg.classList.remove("show");},2000);
  } else {
    alert("保存失败: "+(j.error||"未知错误"));
  }
}

function renderEditor(){
  if(!curIface)return;
  var body=document.getElementById("editor-body");
  var fields=curIface.req_fields||[];var html="";
  fields.forEach(function(f){
    var isSkip=f.rule==="skip"||f.rule==="ignore";
    var isFixed=f.rule&&f.rule.startsWith("fixed:");
    var isRef=f.is_ref||(f.rule&&f.rule.startsWith("sequence:"));
    var isNested=f.rule&&(f.rule.startsWith("nested:")||f.rule.startsWith("object:")||f.rule.startsWith("array:"));
    var isDynamic=f.is_dynamic||(f.rule&&(f.rule.startsWith("mirror")||f.rule.startsWith("body:")||f.rule.startsWith("path:")||f.rule.startsWith("query:")||f.rule.startsWith("header:")||f.rule.startsWith("state:")));
    var ro=isSkip||isFixed;var cls=isSkip?"fi sk":(ro?"fi":"fi");var disp=isSkip?"none":"";
    var badges=[];
    if(f.required)badges.push('<span class="b-r">必填</span>');else badges.push('<span class="b-o">选填</span>');
    if(isSkip)badges.push('<span class="b-s">skip</span>');
    if(isRef)badges.push('<span class="b-rf">序列</span>');
    if(isNested)badges.push('<span class="b-nested">嵌套</span>');
    if(isDynamic)badges.push('<span class="b-dyn">动态</span>');
    var val=f.example;
    // For nested/object/array, example is already a JSON string
    var displayVal="";
    if(isNested&&val){
      displayVal=typeof val==="string"?val:JSON.stringify(val,null,2);
    } else {
      displayVal=val!==undefined&&val!==null?String(val):"";
    }
    html+='<div class="fg" style="display:'+disp+'">';
    html+='<div class="fl">';
    html+='<span class="fn">'+eH(f.name)+'</span>';
    badges.forEach(function(b){html+=b;});
    if(f.desc)html+='<span class="fd">('+eH(f.desc)+')</span>';
    html+='</div>';
    if(isNested){
      // Show as textarea for JSON editing, plus a collapsible preview
      html+='<textarea class="'+cls+'" id="f_'+eA(f.name)+'" style="min-height:380px" '+(ro?"readonly":"")+' oninput="updSum()">'+eA(displayVal)+'</textarea>';
      html+='<div class="nested-preview" id="pv_'+eA(f.name)+'"><pre style="margin:0;white-space:pre-wrap;word-break:break-all">'+pp(displayVal)+'</pre></div>';
    } else {
      html+='<input type="text" class="'+cls+'" id="f_'+eA(f.name)+'" value="'+eA(displayVal)+'" '+(ro?"readonly":"")+' oninput="updSum()">';
    }
    html+='</div>';
  });
  if(!fields.length)html='<div class="eh"><div class="ic">📭</div>该接口无请求参数</div>';
  body.innerHTML=html;updSum();
}

function updSum(){
  if(!curIface)return;
  var fields=curIface.req_fields||[];
  var total=fields.filter(function(f){return f.rule!=="skip";}).length;
  var filled=fields.filter(function(f){
    if(f.rule==="skip")return false;
    var el=document.getElementById("f_"+f.name);return el&&el.value;
  }).length;
  document.getElementById("req-summary").textContent=total>0?"已填写 "+filled+"/"+total+" 个参数":"";
}

async function sendReq(){
  if(!curIface)return;
  var req={};
  (curIface.req_fields||[]).forEach(function(f){
    if(f.rule==="skip")return;
    var el=document.getElementById("f_"+f.name);if(!el)return;
    var val=el.value;
    // Parse JSON for nested fields
    if(f.rule&&(f.rule.startsWith("nested:")||f.rule.startsWith("object:")||f.rule.startsWith("array:"))){
      try{val=JSON.parse(val);}catch(e){}
    }
    req[f.name]=val;
  });
  document.getElementById("resp-body").innerHTML='<div class="eh" style="color:#888"><div class="ic">⏳</div>请求中...</div>';
  try{
    var r=await fetch("/mock/call/"+encodeURIComponent(curProj)+"/"+encodeURIComponent(curIface.path.replace(/^\//,'')),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(req)});
    var text=await r.text();
    var sb=document.getElementById("status-badge");sb.style.display="";sb.className="sb "+(r.ok?"s-ok":"s-err");sb.textContent=r.status+" "+r.statusText;
    // Prettify the JSON before highlighting
    var pretty="";
    try{var obj=JSON.parse(text);pretty=JSON.stringify(obj,null,2);}catch(e){pretty=text;}
    document.getElementById("resp-body").innerHTML="<pre>"+sh(pretty)+"</pre>";
  }catch(e){document.getElementById("resp-body").innerHTML='<div class="eh" style="color:#f87171"><div class="ic">❌</div>'+eH(e.message)+'</div>';}
}

async function clearState(){await fetch("/mock/state",{method:"DELETE"});alert("状态已清空");}

function fmtResp(){
  var pre=document.querySelector("#resp-body pre");
  if(pre){
    try{
      var obj=JSON.parse(pre.textContent||"");
      document.getElementById("resp-body").innerHTML="<pre>"+sh(JSON.stringify(obj,null,2))+"</pre>";
    }catch(e){}
  }
}

function cpResp(){
  var pre=document.querySelector("#resp-body pre");
  if(pre){navigator.clipboard.writeText(pre.textContent).then(function(){alert("已复制");});}
}

init();
</script>
</body>
</html>
