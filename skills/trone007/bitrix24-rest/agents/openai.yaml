interface:
  display_name: "Bitrix24"
  short_description: "Bitrix24 CRM, tasks, chat, and MCP workflows"
  default_prompt: "Use $bitrix24 to work with Bitrix24 CRM, tasks, chat, calendar, drive, users, and MCP docs."
dependencies:
  tools:
    - type: "mcp"
      value: "bitrix24-docs"
      description: "Official Bitrix24 MCP documentation server"
      transport: "streamable_http"
      url: "https://mcp-dev.bitrix24.tech/mcp"
credentials:
  - name: webhook_url
    description: "Bitrix24 inbound webhook URL. Storage: OS keychain (desktop), AES-256 encrypted file (container/headless), or plaintext config (fallback)."
    storage: "auto"
    required: true
config_paths:
  - "~/.config/bitrix24-skill/config.json"
policy:
  allow_implicit_invocation: true
